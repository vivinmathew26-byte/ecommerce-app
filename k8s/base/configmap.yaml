apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: ecommerce
data:
  DEBUG: "False"
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_NAME: ecommerce_db
  DB_USER: postgres
  ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000,http://localhost"
  CORS_ALLOW_ALL_ORIGINS: "True"
